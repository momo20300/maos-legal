<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="#0d1b2e"/>
  
  <!-- Gold top accent line -->
  <rect x="12" y="10" width="40" height="2.5" rx="1.25" fill="#c9a227" opacity="0.9"/>

  <!-- Balance scale beam (horizontal) -->
  <rect x="10" y="24" width="44" height="2.5" rx="1.25" fill="#c9a227"/>
  
  <!-- Center post -->
  <rect x="30.75" y="24" width="2.5" height="22" rx="1.25" fill="#c9a227"/>
  
  <!-- Left scale pan chain -->
  <line x1="17" y1="26.5" x2="14" y2="36" stroke="#c9a227" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="17" y1="26.5" x2="20" y2="36" stroke="#c9a227" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Left pan -->
  <rect x="11" y="36" width="12" height="2.5" rx="1.25" fill="#c9a227"/>

  <!-- Right scale pan chain -->
  <line x1="47" y1="26.5" x2="44" y2="34" stroke="#c9a227" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="47" y1="26.5" x2="50" y2="34" stroke="#c9a227" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Right pan (slightly lower for justice imbalance effect) -->
  <rect x="41" y="34" width="12" height="2.5" rx="1.25" fill="#c9a227"/>

  <!-- Base line -->
  <rect x="22" y="46" width="20" height="2.5" rx="1.25" fill="#c9a227" opacity="0.7"/>
</svg>
